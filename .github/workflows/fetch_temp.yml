name: Fetch Govee Temperature

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write          # needed to commit data.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch temperature from Govee
        env:
          GOVEE_TOKEN: ${{ secrets.GOVEE_TOKEN }}
          GOVEE_CLIENT_ID: ${{ secrets.GOVEE_CLIENT_ID }}
        run: |
          TIMESTAMP=$(date +%s%3N)

          RESPONSE=$(curl -s 'https://app2.govee.com/bff-app/v1/device/list' \
            -H "Authorization: Bearer $GOVEE_TOKEN" \
            -H "timestamp: $TIMESTAMP" \
            -H "clientId: $GOVEE_CLIENT_ID" \
            -H "appVersion: 7.4.02" \
            -H "clientType: 1" \
            -H "envId: 0" \
            -H "iotVersion: 0" \
            -H "Accept: */*" \
            -H "Accept-Language: en" \
            -H "Content-Type: application/json" \
            -H "timezone: America/New_York" \
            -H "country: US" \
            -H "User-Agent: GoveeHome/7.4.02 (com.ihoment.GoVeeSensor; build:2; iOS 26.3.1) Alamofire/5.11.0")

          echo "Raw response: $RESPONSE"

          # Write the full response + a timestamp into data.json
          echo "$RESPONSE" | jq \
            --arg ts "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '. + {fetchedAt: $ts}' > data.json || echo '{"error":"failed to parse response","fetchedAt":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}' > data.json

          cat data.json

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update temperature data"
          git push
